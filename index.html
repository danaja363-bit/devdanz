<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ DANZOFC CYBER DECK PREMIUM ⚡</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }

        /* Efek Quantum Dark */
        body {
            background: #000;
            color: #0f0;
            min-height: 100vh;
            padding: 15px;
            position: relative;
            overflow-x: hidden;
        }

        .quantum-field {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #0f0 0%, transparent 70%);
            opacity: 0.03;
            pointer-events: none;
            z-index: 0;
            animation: quantum 15s ease-in-out infinite;
        }

        @keyframes quantum {
            0%, 100% { transform: scale(1); opacity: 0.03; }
            50% { transform: scale(1.8); opacity: 0.07; }
        }

        .matrix-rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, 
                transparent 0%,
                rgba(0, 255, 0, 0.02) 30%,
                transparent 70%);
            background-size: 100% 200%;
            animation: rain 8s linear infinite;
            pointer-events: none;
        }

        @keyframes rain {
            0% { background-position: 0 0; }
            100% { background-position: 0 200%; }
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* HOLO HEADER */
        .holo-header {
            background: linear-gradient(135deg, #111, #000);
            border: 3px solid #0f0;
            border-radius: 40px;
            padding: 30px;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 100px rgba(0, 255, 0, 0.5);
            transform-style: preserve-3d;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotateX(0deg); }
            50% { transform: translateY(-10px) rotateX(2deg); }
        }

        .holo-header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, 
                transparent 30%, 
                rgba(0, 255, 0, 0.15) 50%, 
                transparent 70%);
            animation: holoScan 8s linear infinite;
        }

        @keyframes holoScan {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .led-panel {
            display: flex;
            gap: 20px;
        }

        .led {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            animation: ledQuantum 2s infinite;
        }

        .led:nth-child(1) { background: #f00; box-shadow: 0 0 30px #f00; animation-delay: 0s; }
        .led:nth-child(2) { background: #ff0; box-shadow: 0 0 30px #ff0; animation-delay: 0.2s; }
        .led:nth-child(3) { background: #0f0; box-shadow: 0 0 30px #0f0; animation-delay: 0.4s; }
        .led:nth-child(4) { background: #0ff; box-shadow: 0 0 30px #0ff; animation-delay: 0.6s; }
        .led:nth-child(5) { background: #f0f; box-shadow: 0 0 30px #f0f; animation-delay: 0.8s; }

        @keyframes ledQuantum {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(1.8); }
        }

        .user-badge {
            background: rgba(0, 255, 0, 0.1);
            border: 2px solid #0f0;
            border-radius: 50px;
            padding: 12px 35px;
            font-size: 1.4em;
            font-weight: bold;
            color: #ff0;
            text-shadow: 0 0 20px #ff0;
            backdrop-filter: blur(10px);
            letter-spacing: 3px;
        }

        .title-section {
            text-align: center;
            margin: 30px 0;
        }

        .main-title {
            font-size: 5.5em;
            font-weight: bold;
            color: #0f0;
            text-shadow: 
                0 0 40px #0f0,
                0 0 80px #0f0,
                3px 3px 0 #ff0,
                -3px -3px 0 #f0f;
            letter-spacing: 15px;
            animation: glitchTitle 3s infinite;
        }

        @keyframes glitchTitle {
            0%, 100% { transform: skew(0deg); }
            95% { transform: skew(3deg); text-shadow: 3px 3px 0 #f0f, -3px -3px 0 #ff0; }
            96% { transform: skew(-3deg); text-shadow: -3px 3px 0 #0ff, 3px -3px 0 #f0f; }
            97% { transform: skew(2deg); }
        }

        .sub-title {
            color: #0f0;
            font-size: 1.2em;
            letter-spacing: 10px;
            margin-top: 15px;
            opacity: 0.9;
        }

        /* STATS GRID */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .stat-card {
            background: rgba(0, 20, 0, 0.7);
            border: 2px solid #0f0;
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(5px);
            animation: statFloat 5s ease-in-out infinite;
            border: 2px solid transparent;
            background: linear-gradient(#111, #000) padding-box,
                        linear-gradient(45deg, #0f0, #ff0) border-box;
        }

        .stat-card:nth-child(2) { animation-delay: 0.3s; }
        .stat-card:nth-child(3) { animation-delay: 0.6s; }
        .stat-card:nth-child(4) { animation-delay: 0.9s; }

        @keyframes statFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .stat-number {
            font-size: 3em;
            font-weight: bold;
            color: #ff0;
            text-shadow: 0 0 30px #ff0;
            line-height: 1;
        }

        .stat-label {
            color: #0f0;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 8px;
        }

        /* TERMINAL PREMIUM */
        .quantum-terminal {
            background: #0a0a0a;
            border: 3px solid #0f0;
            border-radius: 40px;
            margin-bottom: 25px;
            overflow: hidden;
            box-shadow: 0 0 80px rgba(0, 255, 0, 0.5);
            transform: perspective(1000px) rotateX(2deg);
            transition: 0.4s;
        }

        .quantum-terminal:hover {
            transform: perspective(1000px) rotateX(0deg);
            box-shadow: 0 0 150px rgba(0, 255, 0, 0.8);
        }

        .terminal-bar {
            background: linear-gradient(90deg, #111, #0a0a0a);
            padding: 18px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #0f0;
        }

        .terminal-path {
            display: flex;
            gap: 30px;
            color: #0f0;
            font-size: 1em;
        }

        .path-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pulse-dot {
            width: 10px;
            height: 10px;
            background: #0f0;
            border-radius: 50%;
            animation: pulseDot 1.5s infinite;
        }

        @keyframes pulseDot {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 0, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(0, 255, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 0, 0); }
        }

        .terminal-controls {
            display: flex;
            gap: 12px;
        }

        .control {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.3s;
        }

        .control:hover {
            transform: scale(1.3);
            filter: brightness(1.5);
        }

        .terminal-screen {
            padding: 30px;
            min-height: 450px;
            max-height: 550px;
            overflow-y: auto;
            background: #000;
            font-size: 1.1em;
            line-height: 2;
        }

        .quantum-line {
            margin: 15px 0;
            word-break: break-word;
            animation: glowIn 0.4s;
        }

        @keyframes glowIn {
            from { 
                opacity: 0; 
                transform: translateX(-30px); 
                filter: blur(5px);
            }
            to { 
                opacity: 1; 
                transform: translateX(0); 
                filter: blur(0);
            }
        }

        .prompt {
            color: #0f0;
            font-weight: bold;
            font-size: 1.1em;
        }

        .cmd {
            color: #ff0;
            text-shadow: 0 0 10px #ff0;
        }

        .output-success {
            color: #0f0;
            margin-left: 25px;
            position: relative;
        }

        .output-success::before {
            content: '↳';
            position: absolute;
            left: -20px;
            color: #0f0;
            opacity: 0.7;
        }

        .output-warning {
            color: #ff0;
            margin-left: 25px;
            text-shadow: 0 0 10px #ff0;
            position: relative;
        }

        .output-warning::before {
            content: '⚠️';
            position: absolute;
            left: -30px;
            color: #ff0;
        }

        .cursor-quantum {
            display: inline-block;
            width: 15px;
            height: 25px;
            background: #0f0;
            animation: blinkQuantum 1s infinite;
            vertical-align: middle;
            box-shadow: 0 0 20px #0f0;
        }

        @keyframes blinkQuantum {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* HOLOGRAM TOOLS */
        .hologram-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }

        .holo-card {
            background: rgba(0, 30, 0, 0.7);
            border: 2px solid #0f0;
            border-radius: 25px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.4s;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            border: 2px solid transparent;
            background: linear-gradient(#111, #000) padding-box,
                        linear-gradient(135deg, #0f0, #ff0, #0f0) border-box;
            animation: cardGlow 4s ease-in-out infinite;
        }

        .holo-card:nth-child(2) { animation-delay: 0.2s; }
        .holo-card:nth-child(3) { animation-delay: 0.4s; }
        .holo-card:nth-child(4) { animation-delay: 0.6s; }

        @keyframes cardGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 255, 0, 0.3); }
            50% { box-shadow: 0 0 50px rgba(0, 255, 0, 0.7); }
        }

        .holo-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, 
                transparent, 
                rgba(0, 255, 0, 0.2), 
                transparent);
            transform: rotate(45deg);
            animation: holoShine 3s linear infinite;
        }

        @keyframes holoShine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .holo-card:hover {
            transform: scale(1.08) translateY(-12px);
            border-color: #ff0;
            box-shadow: 0 0 80px #0f0;
        }

        .holo-card:active {
            transform: scale(0.95);
        }

        .card-icon {
            font-size: 3.5em;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 20px #0f0);
            animation: iconQuantum 2s infinite;
        }

        @keyframes iconQuantum {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .card-title {
            font-weight: bold;
            color: #0f0;
            font-size: 1.2em;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .card-desc {
            color: #0f0;
            font-size: 0.8em;
            opacity: 0.7;
        }

        /* NETWORK MAP */
        .quantum-network {
            background: #111;
            border: 3px solid #0f0;
            border-radius: 40px;
            padding: 25px;
            margin-bottom: 25px;
            position: relative;
        }

        .network-title {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .quantum-pulse {
            width: 15px;
            height: 15px;
            background: #0f0;
            border-radius: 50%;
            animation: quantumWave 2s infinite;
        }

        @keyframes quantumWave {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 0, 0.7); }
            70% { box-shadow: 0 0 0 40px rgba(0, 255, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 0, 0); }
        }

        .nodes {
            display: flex;
            align-items: center;
            justify-content: space-around;
            margin: 40px 0;
        }

        .node {
            width: 100px;
            height: 100px;
            border: 3px solid #0f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1em;
            font-weight: bold;
            background: #111;
            position: relative;
            animation: nodeQuantum 3s infinite;
            box-shadow: 0 0 40px rgba(0, 255, 0, 0.3);
        }

        .node:nth-child(2) { animation-delay: 0.4s; }
        .node:nth-child(4) { animation-delay: 0.8s; }

        @keyframes nodeQuantum {
            0%, 100% { transform: scale(1); border-color: #0f0; }
            50% { transform: scale(1.15); border-color: #ff0; box-shadow: 0 0 70px #ff0; }
        }

        .node::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid #0f0;
            border-radius: 50%;
            animation: nodeRipple 2.5s infinite;
        }

        @keyframes nodeRipple {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        .line-connect {
            flex: 1;
            height: 4px;
            background: linear-gradient(90deg, #0f0, #ff0, #0f0, #0ff, #f0f);
            background-size: 500% 100%;
            animation: flowQuantum 4s linear infinite;
        }

        @keyframes flowQuantum {
            0% { background-position: 0% 0; }
            100% { background-position: 500% 0; }
        }

        /* METRICS */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }

        .metric-card {
            background: #111;
            border: 3px solid #0f0;
            border-radius: 30px;
            padding: 20px;
            text-align: center;
            border: 2px solid transparent;
            background: linear-gradient(#111, #000) padding-box,
                        linear-gradient(45deg, #0f0, #ff0) border-box;
        }

        .metric-label {
            color: #0f0;
            font-size: 0.9em;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .meter {
            width: 100%;
            height: 15px;
            background: #000;
            border: 2px solid #0f0;
            border-radius: 10px;
            overflow: hidden;
            margin: 15px 0;
        }

        .meter-fill {
            height: 100%;
            background: linear-gradient(90deg, #0f0, #ff0);
            width: 0%;
            transition: width 0.5s;
            position: relative;
            box-shadow: 0 0 20px #0f0;
        }

        .meter-fill::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 5px;
            height: 100%;
            background: #fff;
            box-shadow: 0 0 15px #fff;
            animation: meterScan 2s linear infinite;
        }

        @keyframes meterScan {
            0% { right: 0; }
            100% { right: 100%; }
        }

        .metric-value {
            font-size: 2.2em;
            font-weight: bold;
            color: #ff0;
            text-shadow: 0 0 25px #ff0;
        }

        /* QUANTUM LOG */
        .quantum-log {
            background: #111;
            border: 3px solid #0f0;
            border-radius: 40px;
            padding: 25px;
            margin-bottom: 25px;
            position: relative;
        }

        .quantum-log::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, #0f0, #ff0, #0f0);
            animation: logScan 3s linear infinite;
        }

        @keyframes logScan {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .log-container {
            background: #000;
            border: 2px solid #0f0;
            border-radius: 20px;
            padding: 20px;
            height: 150px;
            overflow-y: auto;
            font-size: 1em;
            line-height: 1.9;
        }

        .log-entry {
            color: #0f0;
            border-bottom: 1px solid #0f0;
            padding: 8px 0;
            font-family: 'Courier New', monospace;
        }

        /* FOOTER */
        .quantum-footer {
            text-align: center;
            padding: 25px;
            color: #0f0;
            font-size: 0.9em;
            border-top: 3px solid #0f0;
            margin-top: 25px;
            position: relative;
        }

        .quantum-footer::before {
            content: '⚡ ⚡ ⚡';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: #000;
            padding: 0 20px;
            color: #0f0;
            font-size: 1.5em;
            letter-spacing: 15px;
        }

        .footer-glitch {
            animation: footerGlitch 4s infinite;
        }

        @keyframes footerGlitch {
            0%, 100% { opacity: 0.9; }
            50% { opacity: 0.4; text-shadow: 0 0 50px #0f0; }
        }

        @media (max-width: 1200px) {
            .hologram-grid { grid-template-columns: repeat(2, 1fr); }
            .main-title { font-size: 4em; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .metrics-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width
